[target.'cfg(all(target_arch = "arm", target_os = "none"))']
runner = "probe-rs run --chip RP235x"
# Alternative runners:
# runner = "elf2uf2-rs -d"
# runner = "picotool load -u -v -x -t elf"

[build]
target = "thumbv8m.main-none-eabihf"

[env]
DEFMT_LOG = "debug"
# Composite USB descriptor: 3 CDC ACM functions (2 interfaces each) +
# 1 vendor-bulk function = 7 interfaces, over embassy-usb's default of 4.
EMBASSY_USB_MAX_INTERFACE_COUNT = "8"
